name: Supply Chain Security

on:
  pull_request:
    paths:
      - '**/package.json'
      - '**/package-lock.json'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '**/*.csproj'
      - '**/Dockerfile'
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6 AM UTC

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Audit root dependencies
        run: |
          echo "🔍 Auditing root package.json..."
          if [ -f "package-lock.json" ]; then
            npm audit --audit-level=high
          else
            echo "⏭️ No package-lock.json at root — generating..."
            npm install --package-lock-only --ignore-scripts 2>/dev/null || true
            npm audit --audit-level=high
          fi
          echo "✅ Root audit complete"

      - name: Audit backend services
        run: |
          echo "🔍 Auditing backend services..."
          SERVICES_CHECKED=0
          for dir in 03-backend/*/; do
            if [ -f "$dir/package.json" ]; then
              SERVICE=$(basename "$dir")
              SERVICES_CHECKED=$((SERVICES_CHECKED + 1))
              if [ -f "$dir/package-lock.json" ]; then
                cd "$dir"
                npm audit --audit-level=high || { echo "  ❌ Audit failed for $SERVICE"; exit 1; }
                cd "$GITHUB_WORKSPACE"
              fi
            fi
          done
          echo "✅ Audited $SERVICES_CHECKED services"

      - name: Check lockfile integrity
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci --ignore-scripts --dry-run 2>&1 || echo "⚠️ Lockfile integrity check had warnings"
          fi
          echo "✅ Lockfile check complete"

  artifact-validation:
    name: Artifact Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate Dockerfiles
        run: |
          echo "🐳 Checking Dockerfiles for security..."
          DOCKER_COUNT=0
          for dockerfile in $(find . -name "Dockerfile" -not -path "*/node_modules/*" -not -path "*/.git/*"); do
            DOCKER_COUNT=$((DOCKER_COUNT + 1))
            DIR=$(dirname "$dockerfile")
            if grep -q "FROM.*:latest" "$dockerfile" 2>/dev/null; then
              echo "  ⚠️ $DIR — uses :latest tag"
            fi
            if grep -q "^ADD http" "$dockerfile" 2>/dev/null; then
              echo "  ⚠️ $DIR — uses ADD with remote URL"
            fi
          done
          echo "✅ Checked $DOCKER_COUNT Dockerfiles"

      - name: Check for hardcoded secrets
        run: |
          echo "🔒 Scanning for hardcoded secrets..."
          # AWS keys
          if grep -rn "AKIA[0-9A-Z]\{16\}" --include="*.js" --include="*.ts" --include="*.json" \
             --exclude-dir=node_modules --exclude-dir=.git . 2>/dev/null; then
            echo "❌ Potential AWS key found!"
            exit 1
          fi
          # GitHub tokens
          if grep -rn "ghp_[0-9a-zA-Z]\{36\}" --include="*.js" --include="*.ts" --include="*.json" \
             --exclude-dir=node_modules --exclude-dir=.git . 2>/dev/null; then
            echo "❌ Potential GitHub token found!"
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Generate SBOM
        run: |
          if [ -f "package.json" ]; then
            npm install --package-lock-only --ignore-scripts 2>/dev/null || true
            npx @cyclonedx/cyclonedx-npm --output-file sbom.json --spec-version 1.5 2>/dev/null || echo "⚠️ SBOM generation had warnings"
          fi
          echo "✅ SBOM generation complete"

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sbom
          path: sbom.json
          retention-days: 90
