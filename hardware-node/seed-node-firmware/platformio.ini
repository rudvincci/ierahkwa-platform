; Ierahkwa Seed Node Firmware — PlatformIO Configuration
; Target: ESP32-S3 with LoRa (SX1276/SX1262)
; Boards: LilyGo T-Beam, Heltec WiFi LoRa 32 V3, generic ESP32-S3
;
; Build:  pio run
; Flash:  pio run --target upload
; Monitor: pio device monitor

[env:esp32s3-tbeam]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DBOARD_TBEAM
    -DLORA_FREQ=433E6
    -DIERAHKWA_SYNC_WORD=0x13
    -DNODE_SLEEP_MINUTES=5
    -DAES_KEY_SIZE=32
lib_deps =
    sandeepmistry/LoRa@^0.8.0
    bblanchon/ArduinoJson@^7.0.0
    rweather/Crypto@^0.4.0

[env:heltec-v3]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
build_flags =
    -DBOARD_HELTEC_V3
    -DLORA_FREQ=433E6
    -DIERAHKWA_SYNC_WORD=0x13
    -DNODE_SLEEP_MINUTES=5
    -DAES_KEY_SIZE=32
lib_deps =
    sandeepmistry/LoRa@^0.8.0
    bblanchon/ArduinoJson@^7.0.0
    rweather/Crypto@^0.4.0
