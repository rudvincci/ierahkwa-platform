# Ierahkwa Platform — AI Model Server K8s Manifests
# v3.3.0 — AI model serving infrastructure (port 5050)
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: ai-model-server, namespace: ierahkwa, labels: { app: ai-model-server, nexus: cerebro, version: v3.3.0 } }
spec:
  replicas: 2
  selector: { matchLabels: { app: ai-model-server } }
  template:
    metadata: { labels: { app: ai-model-server, nexus: cerebro } }
    spec:
      containers:
      - name: ai-model-server
        image: ierahkwa/ai-model-server:3.3.0
        ports: [{ containerPort: 8080 }]
        env: [{ name: ASPNETCORE_ENVIRONMENT, value: Production }]
        resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 1000m, memory: 1Gi } }
        livenessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 10, periodSeconds: 30 }
        readinessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 5, periodSeconds: 10 }
        securityContext: { runAsNonRoot: true, readOnlyRootFilesystem: true, allowPrivilegeEscalation: false }
---
apiVersion: v1
kind: Service
metadata: { name: ai-model-server, namespace: ierahkwa, labels: { nexus: cerebro } }
spec: { type: ClusterIP, selector: { app: ai-model-server }, ports: [{ port: 5050, targetPort: 8080, protocol: TCP }] }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: ai-model-server-hpa, namespace: ierahkwa }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: ai-model-server }
  minReplicas: 2
  maxReplicas: 10
  metrics: [{ type: Resource, resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } } }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-model-server-policy
  namespace: ierahkwa
spec:
  podSelector:
    matchLabels:
      app: ai-model-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ierahkwa
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: ierahkwa
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: UDP
          port: 53
