# Ierahkwa Platform — NEXUS Escudo K8s Manifests
# v3.3.0 — 5 microservices (ports 5200-5204)
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: military-service, namespace: ierahkwa, labels: { app: military-service, nexus: escudo, version: v3.3.0 } }
spec:
  replicas: 2
  selector: { matchLabels: { app: military-service } }
  template:
    metadata: { labels: { app: military-service, nexus: escudo } }
    spec:
      containers:
      - name: military-service
        image: ierahkwa.azurecr.io/military-service:latest
        ports: [{ containerPort: 8080 }]
        env: [{ name: ASPNETCORE_ENVIRONMENT, value: Production }]
        resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 1000m, memory: 1Gi } }
        livenessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 10, periodSeconds: 30 }
        readinessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 5, periodSeconds: 10 }
        securityContext: { runAsNonRoot: true, readOnlyRootFilesystem: true, allowPrivilegeEscalation: false }
---
apiVersion: v1
kind: Service
metadata: { name: military-service, namespace: ierahkwa, labels: { nexus: escudo } }
spec: { type: ClusterIP, selector: { app: military-service }, ports: [{ port: 5200, targetPort: 8080, protocol: TCP }] }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: military-service-hpa, namespace: ierahkwa }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: military-service }
  minReplicas: 2
  maxReplicas: 10
  metrics: [{ type: Resource, resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } } }]
