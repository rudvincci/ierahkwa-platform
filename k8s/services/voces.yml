# Ierahkwa Platform — NEXUS Voces K8s Manifests
# v3.3.0 — 5 microservices (ports 5500-5504)
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: media-service, namespace: ierahkwa, labels: { app: media-service, nexus: voces, version: v3.3.0 } }
spec:
  replicas: 2
  selector: { matchLabels: { app: media-service } }
  template:
    metadata: { labels: { app: media-service, nexus: voces } }
    spec:
      containers:
      - name: media-service
        image: ierahkwa.azurecr.io/media-service:latest
        ports: [{ containerPort: 8080 }]
        env: [{ name: ASPNETCORE_ENVIRONMENT, value: Production }]
        resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 1000m, memory: 1Gi } }
        livenessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 10, periodSeconds: 30 }
        readinessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 5, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: media-service, namespace: ierahkwa, labels: { nexus: voces } }
spec: { type: ClusterIP, selector: { app: media-service }, ports: [{ port: 5500, targetPort: 8080, protocol: TCP }] }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: media-service-hpa, namespace: ierahkwa }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: media-service }
  minReplicas: 2
  maxReplicas: 10
  metrics: [{ type: Resource, resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } } }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: messaging-service, namespace: ierahkwa, labels: { app: messaging-service, nexus: voces, version: v3.3.0 } }
spec:
  replicas: 2
  selector: { matchLabels: { app: messaging-service } }
  template:
    metadata: { labels: { app: messaging-service, nexus: voces } }
    spec:
      containers:
      - name: messaging-service
        image: ierahkwa.azurecr.io/messaging-service:latest
        ports: [{ containerPort: 8080 }]
        env: [{ name: ASPNETCORE_ENVIRONMENT, value: Production }]
        resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 1000m, memory: 1Gi } }
        livenessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 10, periodSeconds: 30 }
        readinessProbe: { httpGet: { path: /health/ready, port: 8080 }, initialDelaySeconds: 5, periodSeconds: 10, timeoutSeconds: 3, failureThreshold: 3 }
---
apiVersion: v1
kind: Service
metadata: { name: messaging-service, namespace: ierahkwa }
