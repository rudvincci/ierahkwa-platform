# Ierahkwa Platform — NEXUS Raices K8s Manifests
# v3.3.0 — 4 microservices (ports 6000-6003)
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: identity-service, namespace: ierahkwa, labels: { app: identity-service, nexus: raices, version: v3.3.0 } }
spec:
  replicas: 2
  selector: { matchLabels: { app: identity-service } }
  template:
    metadata: { labels: { app: identity-service, nexus: raices } }
    spec:
      containers:
      - name: identity-service
        image: ierahkwa.azurecr.io/identity-service:latest
        ports: [{ containerPort: 8080 }]
        env: [{ name: ASPNETCORE_ENVIRONMENT, value: Production }]
        resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 1000m, memory: 1Gi } }
        livenessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 10, periodSeconds: 30 }
        readinessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 5, periodSeconds: 10 }
        securityContext: { runAsNonRoot: true, readOnlyRootFilesystem: true, allowPrivilegeEscalation: false }
---
apiVersion: v1
kind: Service
metadata: { name: identity-service, namespace: ierahkwa, labels: { nexus: raices } }
spec: { type: ClusterIP, selector: { app: identity-service }, ports: [{ port: 6000, targetPort: 8080, protocol: TCP }] }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: identity-service-hpa, namespace: ierahkwa }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: identity-service }
  minReplicas: 2
  maxReplicas: 10
  metrics: [{ type: Resource, resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } } }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: health-service, namespace: ierahkwa, labels: { app: health-service, nexus: raices, version: v3.3.0 } }
spec:
  replicas: 2
  selector: { matchLabels: { app: health-service } }
  template:
    metadata: { labels: { app: health-service, nexus: raices } }
    spec:
      containers:
      - name: health-service
        image: ierahkwa.azurecr.io/health-service:latest
        ports: [{ containerPort: 8080 }]
        env: [{ name: ASPNETCORE_ENVIRONMENT, value: Production }]
        resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 1000m, memory: 1Gi } }
        livenessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 10, periodSeconds: 30 }
        readinessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 5, periodSeconds: 10 }
        securityContext: { runAsNonRoot: true, readOnlyRootFilesystem: true, allowPrivilegeEscalation: false }
---
apiVersion: v1
kind: Service
metadata: { name: health-service, namespace: ierahkwa }
spec: { type: ClusterIP, selector: { app: health-service }, ports: [{ port: 6001, targetPort: 8080 }] }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: health-service-hpa, namespace: ierahkwa }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: health-service }
  minReplicas: 2
  maxReplicas: 10
  metrics: [{ type: Resource, resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } } }]
---
