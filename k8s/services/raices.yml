---
apiVersion: apps/v1
kind: Deployment
metadata: { name: licensing-service, namespace: ierahkwa, labels: { app: licensing-service, nexus: raices, version: v3.3.0 } }
spec:
  replicas: 2
  selector: { matchLabels: { app: licensing-service } }
  template:
    metadata: { labels: { app: licensing-service, nexus: raices } }
    spec:
      containers:
      - name: licensing-service
        image: ierahkwa.azurecr.io/licensing-service:latest
        ports: [{ containerPort: 8080 }]
        env: [{ name: ASPNETCORE_ENVIRONMENT, value: Production }]
        resources: { requests: { cpu: 100m, memory: 128Mi }, limits: { cpu: 500m, memory: 512Mi } }
