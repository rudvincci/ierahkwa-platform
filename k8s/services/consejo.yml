# Ierahkwa Platform — NEXUS Consejo K8s Manifests
# v3.3.0 — 5 microservices (ports 5600-5604)
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: governance-service, namespace: ierahkwa, labels: { app: governance-service, nexus: consejo, version: v3.3.0 } }
spec:
  replicas: 2
  selector: { matchLabels: { app: governance-service } }
  template:
    metadata: { labels: { app: governance-service, nexus: consejo } }
    spec:
      containers:
      - name: governance-service
        image: ierahkwa.azurecr.io/governance-service:latest
        ports: [{ containerPort: 8080 }]
        env: [{ name: ASPNETCORE_ENVIRONMENT, value: Production }]
        resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 1000m, memory: 1Gi } }
        livenessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 10, periodSeconds: 30 }
        readinessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 5, periodSeconds: 10 }
        securityContext: { runAsNonRoot: true, readOnlyRootFilesystem: true, allowPrivilegeEscalation: false }
---
apiVersion: v1
kind: Service
metadata: { name: governance-service, namespace: ierahkwa, labels: { nexus: consejo } }
spec: { type: ClusterIP, selector: { app: governance-service }, ports: [{ port: 5600, targetPort: 8080, protocol: TCP }] }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: governance-service-hpa, namespace: ierahkwa }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: governance-service }
  minReplicas: 2
  maxReplicas: 10
  metrics: [{ type: Resource, resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } } }]
