# Ierahkwa Platform — NEXUS Tierra K8s Manifests
# v3.3.0 — 5 microservices (ports 5700-5704)
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: agriculture-service, namespace: ierahkwa, labels: { app: agriculture-service, nexus: tierra, version: v3.3.0 } }
spec:
  replicas: 2
  selector: { matchLabels: { app: agriculture-service } }
  template:
    metadata: { labels: { app: agriculture-service, nexus: tierra } }
    spec:
      containers:
      - name: agriculture-service
        image: ierahkwa.azurecr.io/agriculture-service:latest
        ports: [{ containerPort: 8080 }]
        env: [{ name: ASPNETCORE_ENVIRONMENT, value: Production }]
        resources: { requests: { cpu: 100m, memory: 128Mi }, limits: { cpu: 500m, memory: 512Mi } }
        livenessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 10, periodSeconds: 30 }
        readinessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 5, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: agriculture-service, namespace: ierahkwa, labels: { nexus: tierra } }
spec: { type: ClusterIP, selector: { app: agriculture-service }, ports: [{ port: 5700, targetPort: 8080, protocol: TCP }] }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: agriculture-service-hpa, namespace: ierahkwa }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: agriculture-service }
  minReplicas: 2
  maxReplicas: 10
  metrics: [{ type: Resource, resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } } }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: naturalresource-service, namespace: ierahkwa, labels: { app: naturalresource-service, nexus: tierra, version: v3.3.0 } }
