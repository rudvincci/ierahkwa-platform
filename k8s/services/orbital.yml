# Ierahkwa Platform — NEXUS Orbital K8s Manifests
# v3.3.0 — 8 microservices (ports 5100-5107)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: space-service
  namespace: ierahkwa
  labels:
    app: space-service
    nexus: orbital
    version: v3.3.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: space-service
  template:
    metadata:
      labels:
        app: space-service
        nexus: orbital
    spec:
      containers:
      - name: space-service
        image: ierahkwa.azurecr.io/space-service:latest
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: Production
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: space-service
  namespace: ierahkwa
  labels:
    nexus: orbital
spec:
  type: ClusterIP
  selector:
    app: space-service
  ports:
  - port: 5100
    targetPort: 8080
    protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: space-service-hpa
  namespace: ierahkwa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: space-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
