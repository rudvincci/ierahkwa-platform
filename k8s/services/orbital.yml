---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nexus-orbital-policy
  namespace: ierahkwa
spec:
  podSelector:
    matchLabels:
      nexus: orbital
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ierahkwa
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: ierahkwa
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: UDP
          port: 53
