# Ierahkwa Platform — NEXUS Tesoro K8s Manifests
# v3.3.0 — 8 microservices (ports 5400-5407)
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: commerce-service, namespace: ierahkwa, labels: { app: commerce-service, nexus: tesoro, version: v3.3.0 } }
spec:
  replicas: 2
  selector: { matchLabels: { app: commerce-service } }
  template:
    metadata: { labels: { app: commerce-service, nexus: tesoro } }
    spec:
      containers:
      - name: commerce-service
        image: ierahkwa.azurecr.io/commerce-service:latest
        ports: [{ containerPort: 8080 }]
        env: [{ name: ASPNETCORE_ENVIRONMENT, value: Production }]
        resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 1000m, memory: 1Gi } }
        livenessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 10, periodSeconds: 30 }
        readinessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 5, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: commerce-service, namespace: ierahkwa, labels: { nexus: tesoro } }
spec: { type: ClusterIP, selector: { app: commerce-service }, ports: [{ port: 5400, targetPort: 8080, protocol: TCP }] }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: commerce-service-hpa, namespace: ierahkwa }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: commerce-service }
  minReplicas: 2
  maxReplicas: 10
  metrics: [{ type: Resource, resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } } }]
---
