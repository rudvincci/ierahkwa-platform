# Ierahkwa Platform — NEXUS Cerebro K8s Manifests
# v3.3.0 — 4 microservices (ports 5300-5303)
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: education-service, namespace: ierahkwa, labels: { app: education-service, nexus: cerebro, version: v3.3.0 } }
spec:
  replicas: 2
  selector: { matchLabels: { app: education-service } }
  template:
    metadata: { labels: { app: education-service, nexus: cerebro } }
    spec:
      containers:
      - name: education-service
        image: ierahkwa.azurecr.io/education-service:latest
        ports: [{ containerPort: 8080 }]
        env: [{ name: ASPNETCORE_ENVIRONMENT, value: Production }]
        resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 1000m, memory: 1Gi } }
        livenessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 10, periodSeconds: 30 }
        readinessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 5, periodSeconds: 10 }
        securityContext: { runAsNonRoot: true, readOnlyRootFilesystem: true, allowPrivilegeEscalation: false }
---
apiVersion: v1
kind: Service
metadata: { name: education-service, namespace: ierahkwa, labels: { nexus: cerebro } }
spec: { type: ClusterIP, selector: { app: education-service }, ports: [{ port: 5300, targetPort: 8080, protocol: TCP }] }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: education-service-hpa, namespace: ierahkwa }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: education-service }
  minReplicas: 2
  maxReplicas: 10
  metrics: [{ type: Resource, resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } } }]
---
