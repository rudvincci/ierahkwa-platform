# ═══════════════════════════════════════════════════════════════════════════════
#  IERAHKWA SOVEREIGN PLATFORM - NGINX CONFIGURATION v2.0
#  Production-Ready: SSL/TLS 1.3, Load Balancing, Security Headers
#  25+ backend services, 18 sovereign-core modules, 422 platforms
# ═══════════════════════════════════════════════════════════════════════════════

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─────────────────────────────────────────────────────────────────────────
    #  LOGGING
    # ─────────────────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_local",'
            '"ip":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes":$body_bytes_sent,'
            '"rt":"$request_time",'
            '"upstream_rt":"$upstream_response_time",'
            '"ua":"$http_user_agent",'
            '"ref":"$http_referer"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ─────────────────────────────────────────────────────────────────────────
    #  PERFORMANCE
    # ─────────────────────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 50m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/rss+xml image/svg+xml;

    # ─────────────────────────────────────────────────────────────────────────
    #  RATE LIMITING
    # ─────────────────────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=trading_limit:10m rate=200r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ─────────────────────────────────────────────────────────────────────────
    #  UPSTREAM SERVERS — All Backend Services
    # ─────────────────────────────────────────────────────────────────────────

    # Sovereign Core — 18 modules (auth, bank, exchange, crypto, etc.)
    upstream sovereign_core {
        least_conn;
        server sovereign-core:3050 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # API Gateway — routing + circuit breaker
    upstream api_gateway {
        server api-gateway:3004 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # Blockchain API — MameyNode RPC
    upstream blockchain_api {
        server blockchain-api:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # Forex Trading — real-time market data + Socket.IO
    upstream forex_trading {
        server forex-trading:3500 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # WiFi Soberano — captive portal
    upstream wifi_backend {
        server wifi-soberano:3095 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # Shop — e-commerce + POS
    upstream shop_backend {
        server ierahkwa-shop:3100 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    # Conferencia — WebRTC signaling
    upstream conferencia_backend {
        server conferencia-soberana:3090;
    }

    # Vigilancia — SIEM
    upstream vigilancia_backend {
        server vigilancia-soberana:3091;
    }

    # Empresa — ERP
    upstream empresa_backend {
        server empresa-soberana:3092;
    }

    # Voto — Governance
    upstream voto_backend {
        server voto-soberano:3006;
    }

    # Red Social
    upstream social_backend {
        server red-social:3003;
    }

    # Reservas
    upstream reservas_backend {
        server reservas:3005;
    }

    # POS
    upstream pos_backend {
        server pos-system:3030;
    }

    # Image Upload
    upstream image_backend {
        server image-upload:3300;
    }

    # Monitoring
    upstream grafana_backend {
        server grafana:3000;
    }

    # ─────────────────────────────────────────────────────────────────────────
    #  SSL CONFIGURATION
    # ─────────────────────────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ─────────────────────────────────────────────────────────────────────────
    #  HTTP -> HTTPS REDIRECT
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }

        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    #  MAIN HTTPS SERVER — ierahkwa.gov
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name ierahkwa.gov api.ierahkwa.gov *.ierahkwa.gov;

        ssl_certificate /etc/letsencrypt/live/ierahkwa.gov/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ierahkwa.gov/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/ierahkwa.gov/chain.pem;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        limit_conn conn_limit 50;

        # ═══════════════════════════════════════════════════════════════════
        #  SOVEREIGN CORE API — /v1/* (18 modules)
        # ═══════════════════════════════════════════════════════════════════

        # Auth (stricter rate limit)
        location /v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://sovereign_core;
            include /etc/nginx/proxy_params;
        }

        # Payments — cards, intents, refunds, tips
        location /v1/payments/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://sovereign_core;
            include /etc/nginx/proxy_params;
        }

        # Exchange — matching engine, order book, trades
        location /v1/exchange/ {
            limit_req zone=trading_limit burst=100 nodelay;
            proxy_pass http://sovereign_core;
            include /etc/nginx/proxy_params;
        }

        # Bank — accounts, transfers, VIP, international, statements
        location /v1/bank/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://sovereign_core;
            include /etc/nginx/proxy_params;
        }

        # ATM — deposits, withdrawals, WPM purchase, locations
        location /v1/atm/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://sovereign_core;
            include /etc/nginx/proxy_params;
        }

        # Crypto — wallets, send/receive, swap, bridge
        location /v1/crypto/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://sovereign_core;
            include /etc/nginx/proxy_params;
        }

        # Hosting — domains, VPS, DNS, cloud
        location /v1/hosting/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://sovereign_core;
            include /etc/nginx/proxy_params;
        }

        # Marketplace — buy/sell, escrow, orders
        location /v1/marketplace/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://sovereign_core;
            include /etc/nginx/proxy_params;
        }

        # Loans — applications, repayments, credit score
        location /v1/loans/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://sovereign_core;
            include /etc/nginx/proxy_params;
        }

        # Staking — pools, stake/unstake, rewards
        location /v1/staking/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://sovereign_core;
            include /etc/nginx/proxy_params;
        }

        # Notifications — alerts, preferences, price alerts
        location /v1/notifications/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://sovereign_core;
            include /etc/nginx/proxy_params;
        }

        # Users, Messages, Votes, Storage, Analytics, Content
        location /v1/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://sovereign_core;
            include /etc/nginx/proxy_params;
        }

        # ═══════════════════════════════════════════════════════════════════
        #  API GATEWAY — /api/*
        # ═══════════════════════════════════════════════════════════════════

        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://api_gateway;
            include /etc/nginx/proxy_params;
        }

        # ═══════════════════════════════════════════════════════════════════
        #  BLOCKCHAIN — /chain/*
        # ═══════════════════════════════════════════════════════════════════

        location /chain/ {
            proxy_pass http://blockchain_api/;
            include /etc/nginx/proxy_params;
        }

        # ═══════════════════════════════════════════════════════════════════
        #  TRADING — /trading/*
        # ═══════════════════════════════════════════════════════════════════

        location /trading/ {
            limit_req zone=trading_limit burst=100 nodelay;
            proxy_pass http://forex_trading/;
            include /etc/nginx/proxy_params;
        }

        location /socket.io/ {
            proxy_pass http://forex_trading;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # ═══════════════════════════════════════════════════════════════════
        #  WIFI SOBERANO — /wifi/*
        # ═══════════════════════════════════════════════════════════════════

        location /wifi/ {
            proxy_pass http://wifi_backend/;
            include /etc/nginx/proxy_params;
        }

        location /api/v1/wifi/ {
            proxy_pass http://wifi_backend/api/v1/wifi/;
            include /etc/nginx/proxy_params;
        }

        location /ws/wifi {
            proxy_pass http://wifi_backend/ws/wifi;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # ═══════════════════════════════════════════════════════════════════
        #  OTHER SERVICES
        # ═══════════════════════════════════════════════════════════════════

        # Shop
        location /shop/ {
            proxy_pass http://shop_backend/;
            include /etc/nginx/proxy_params;
        }

        # Video Conferencing
        location /conferencia/ {
            proxy_pass http://conferencia_backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Vigilancia / Security
        location /vigilancia/ {
            proxy_pass http://vigilancia_backend/;
            include /etc/nginx/proxy_params;
        }

        # ERP
        location /empresa/ {
            proxy_pass http://empresa_backend/;
            include /etc/nginx/proxy_params;
        }

        # Governance / Voting
        location /voto/ {
            proxy_pass http://voto_backend/;
            include /etc/nginx/proxy_params;
        }

        # Social Network
        location /social/ {
            proxy_pass http://social_backend/;
            include /etc/nginx/proxy_params;
        }

        # Reservations
        location /reservas/ {
            proxy_pass http://reservas_backend/;
            include /etc/nginx/proxy_params;
        }

        # POS
        location /pos/ {
            proxy_pass http://pos_backend/;
            include /etc/nginx/proxy_params;
        }

        # Image Upload
        location /upload/ {
            client_max_body_size 50m;
            proxy_pass http://image_backend/;
            include /etc/nginx/proxy_params;
        }

        # ═══════════════════════════════════════════════════════════════════
        #  WEBSOCKET — sovereign-core /ws/chat
        # ═══════════════════════════════════════════════════════════════════

        location /ws/chat {
            proxy_pass http://sovereign_core;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ═══════════════════════════════════════════════════════════════════
        #  HEALTH CHECKS
        # ═══════════════════════════════════════════════════════════════════

        location /health {
            access_log off;
            proxy_pass http://sovereign_core/health;
        }

        location /ready {
            access_log off;
            proxy_pass http://sovereign_core/ready;
        }

        # ═══════════════════════════════════════════════════════════════════
        #  STATIC FILES — 422 HTML Platforms
        # ═══════════════════════════════════════════════════════════════════

        location / {
            root /usr/share/nginx/html/plataformas;
            index index.html;
            try_files $uri $uri/ /index.html;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }

        # ─────────────────────────────────────────────────────────────────
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    #  MONITORING SERVER (Internal Only)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name monitor.ierahkwa.gov;

        ssl_certificate /etc/letsencrypt/live/ierahkwa.gov/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ierahkwa.gov/privkey.pem;

        location /grafana/ {
            proxy_pass http://grafana_backend/;
            include /etc/nginx/proxy_params;
        }
    }
}
