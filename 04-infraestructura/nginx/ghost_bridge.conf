#  IERAHKWA GHOST BRIDGE — v11.0.0-PHANTOM
#  Transporte oculto: tráfico camuflado como WebRTC/HTTPS para evadir DPI
#  Usado con Tor Snowflake (ierahkwa_ghost container)
# ═══════════════════════════════════════════════════════════════════════════════
#  El tráfico de Matrix/Synapse y servicios soberanos puede enrutarse a través
#  del proxy Snowflake para que firewalls nacionales vean "videollamada WebRTC"
#  en lugar de tráfico de red soberana.
#
#  Upstream apunta al contenedor snowflake-proxy cuando está activo.
#  Variables de entorno: GHOST_ENABLED=1 para activar en producción.
# ═══════════════════════════════════════════════════════════════════════════════

# Snowflake no es un proxy HTTP tradicional.
# Los clientes Tor usan: UseBridges 1 + Bridge snowflake ...
# El contenedor ierahkwa_ghost (snowflake-proxy) corre en la red sovereign-net.
