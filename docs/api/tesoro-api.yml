      parameters:
        - $ref: '#/components/parameters/IdParam'
      summary: Remove chain
      responses:
        '204':
          description: Deleted
  /api/blockchain/contracts/deploy:
    post:
      tags: [blockchain-service]
      summary: Deploy smart contract
      requestBody:
        content:
          application/json:
            schema:
              type: object
