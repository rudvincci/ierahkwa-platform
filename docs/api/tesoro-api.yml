    post:
      tags: [blockchain-service]
      summary: Create chain
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Created
  /api/blockchain/{id}:
    get:
      tags: [blockchain-service]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      summary: Get chain
      responses:
        '200':
          description: OK
    put:
      tags: [blockchain-service]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      summary: Update chain config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
    delete:
