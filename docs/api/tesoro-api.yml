openapi: 3.0.3
info:
  title: Ierahkwa NEXUS — Tesoro Domain API
  description: >
    TESORO domain services for the Ierahkwa platform. Covers commerce, blockchain,
    banking, insurance, employment, smart manufacturing, artisan marketplace, and tourism.
  version: 3.3.0
  x-api-version: "1.0.0"
  contact:
    name: Ierahkwa Platform Team
    url: https://docs.ierahkwa.io

servers:
  - url: https://api.ierahkwa.io
    description: Production
  - url: http://localhost:5400
    description: Local — commerce-service
  - url: http://localhost:5401
    description: Local — blockchain-service
  - url: http://localhost:5402
    description: Local — banking-service
  - url: http://localhost:5403
    description: Local — insurance-service
  - url: http://localhost:5404
    description: Local — employment-service
  - url: http://localhost:5405
    description: Local — smartfactory-service
  - url: http://localhost:5406
    description: Local — artisan-service
  - url: http://localhost:5407
    description: Local — tourism-service

tags:
  - name: commerce-service
    description: Product catalog, orders, payments, marketplace
  - name: blockchain-service
    description: Chain management, smart contracts, token operations
  - name: banking-service
    description: Accounts, transfers, ledger, compliance
  - name: insurance-service
    description: Policy management, claims, underwriting
  - name: employment-service
    description: Job listings, applications, workforce analytics
  - name: smartfactory-service
    description: Manufacturing lines, quality control, supply chain
  - name: artisan-service
    description: Artisan profiles, craft listings, fair-trade tracking
  - name: tourism-service
    description: Destination catalog, bookings, itinerary planning

security:
  - bearerAuth: []

paths:
  # ── commerce-service ──
  /api/commerce/health:
    get:
      tags: [commerce-service]
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/commerce/stats:
    get:
      tags: [commerce-service]
      summary: Service statistics
      responses:
        '200':
          description: OK
  /api/commerce:
    get:
      tags: [commerce-service]
      summary: List products
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
    post:
      tags: [commerce-service]
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                price:
                  type: number
                currency:
                  type: string
      responses:
        '201':
          description: Created
  /api/commerce/{id}:
    get:
      tags: [commerce-service]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      summary: Get product
      responses:
        '200':
          description: OK
    put:
      tags: [commerce-service]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      summary: Update product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
    delete:
      tags: [commerce-service]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      summary: Delete product
      responses:
        '204':
          description: Deleted
  /api/commerce/orders:
    post:
      tags: [commerce-service]
      summary: Place order
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      productId:
                        type: string
                      quantity:
                        type: integer
      responses:
        '201':
          description: Order placed
  /api/commerce/checkout:
    post:
      tags: [commerce-service]
      summary: Process checkout and payment
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                orderId:
                  type: string
                paymentMethod:
                  type: string
      responses:
        '200':
          description: Checkout processed

