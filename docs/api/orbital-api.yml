  /api/iot-robotics:
    get:
      tags: [iot-robotics-service]
      summary: List registered devices
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list
    post:
      tags: [iot-robotics-service]
      summary: Register device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Created
  /api/iot-robotics/{id}:
    get:
      tags: [iot-robotics-service]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      summary: Get device
      responses:
        '200':
          description: OK
    put:
      tags: [iot-robotics-service]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      summary: Update device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
    delete:
      tags: [iot-robotics-service]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      summary: Deregister device
      responses:
        '204':
          description: Deleted
  /api/iot-robotics/devices/telemetry:
    post:
      tags: [iot-robotics-service]
      summary: Ingest device telemetry batch
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                deviceId:
                  type: string
                readings:
                  type: array
                  items:
                    type: object
      responses:
        '202':
          description: Accepted
  /api/iot-robotics/robots/commands:
    post:
      tags: [iot-robotics-service]
      summary: Send command to robot fleet
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fleetId:
                  type: string
                command:
                  type: string
      responses:
        '200':
          description: Command dispatched

  # ── quantum-service ──
  /api/quantum/health:
