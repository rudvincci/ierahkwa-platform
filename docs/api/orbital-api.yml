          application/json:
            schema:
              type: object
              properties:
                qasm:
                  type: string
                shots:
                  type: integer
                backend:
                  type: string
      responses:
        '202':
          description: Execution queued
  /api/quantum/qubits/status:
    get:
      tags: [quantum-service]
      summary: Get qubit coherence and error rates
      responses:
        '200':
