      tags: [ai-engine-service]
      summary: List AI models
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list
    post:
      tags: [ai-engine-service]
      summary: Register AI model
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Created
  /api/ai-engine/{id}:
    get:
      tags: [ai-engine-service]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      summary: Get model details
      responses:
        '200':
          description: OK
    put:
      tags: [ai-engine-service]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      summary: Update model metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
    delete:
      tags: [ai-engine-service]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      summary: Delete model
      responses:
        '204':
