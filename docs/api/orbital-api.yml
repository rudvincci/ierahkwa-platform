      summary: List quantum jobs
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list
    post:
      tags: [quantum-service]
      summary: Submit quantum job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Created
  /api/quantum/{id}:
    get:
      tags: [quantum-service]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      summary: Get quantum job
      responses:
        '200':
          description: OK
    put:
      tags: [quantum-service]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      summary: Update quantum job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
