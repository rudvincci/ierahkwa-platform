      tags: [devtools-service]
      summary: List developer tools & SDKs
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list
    post:
      tags: [devtools-service]
      summary: Register developer tool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Created
  /api/devtools/{id}:
    get:
      tags: [devtools-service]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      summary: Get tool details
      responses:
        '200':
          description: OK
    put:
      tags: [devtools-service]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      summary: Update tool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
    delete:
      tags: [devtools-service]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      summary: Delete tool
      responses:
        '204':
          description: Deleted
  /api/devtools/sdk/generate:
