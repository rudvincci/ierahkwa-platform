openapi: 3.0.3
info:
  title: Ierahkwa NEXUS — Orbital Domain API
  description: >
    ORBITAL domain services for the Ierahkwa platform. Covers space operations,
    telecommunications, genomics, IoT/robotics, quantum computing, AI engine,
    network infrastructure, and developer tools.
  version: 3.3.0
  x-api-version: "1.0.0"
  contact:
    name: Ierahkwa Platform Team
    url: https://docs.ierahkwa.io

servers:
  - url: https://api.ierahkwa.io
    description: Production
  - url: http://localhost:5100
    description: Local — space-service
  - url: http://localhost:5101
    description: Local — telecom-service
  - url: http://localhost:5102
    description: Local — genomics-service
  - url: http://localhost:5103
    description: Local — iot-robotics-service
  - url: http://localhost:5104
    description: Local — quantum-service
  - url: http://localhost:5105
    description: Local — ai-engine-service
  - url: http://localhost:5106
    description: Local — network-service
  - url: http://localhost:5107
    description: Local — devtools-service

tags:
  - name: space-service
    description: Satellite tracking, orbital mechanics, launch scheduling
  - name: telecom-service
    description: Telecommunications infrastructure and spectrum management
  - name: genomics-service
    description: Genomic sequencing, CRISPR pipelines, biobank management
  - name: iot-robotics-service
    description: IoT device registry and robotics fleet coordination
  - name: quantum-service
    description: Quantum circuit execution and qubit management
  - name: ai-engine-service
    description: Model training, inference endpoints, prompt management
  - name: network-service
    description: Network topology, routing, bandwidth allocation
  - name: devtools-service
    description: SDK generation, API playground, developer portals

security:
  - bearerAuth: []

paths:
  # ── space-service ──
  /api/space/health:
    get:
      tags: [space-service]
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/space/stats:
    get:
      tags: [space-service]
      summary: Service statistics
      responses:
        '200':
          description: OK
  /api/space:
    get:
      tags: [space-service]
      summary: List space assets
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
    post:
      tags: [space-service]
      summary: Register space asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [satellite, probe, station]
                orbitAltitudeKm:
                  type: number
      responses:
        '201':
          description: Created
  /api/space/{id}:
    get:
      tags: [space-service]
      summary: Get space asset by ID
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: OK
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [space-service]
      summary: Update space asset
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
    delete:
      tags: [space-service]
      summary: Delete space asset
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Deleted
  /api/space/satellites/track:
    post:
      tags: [space-service]
      summary: Initiate real-time satellite tracking session
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                noradId:
                  type: string
                durationMinutes:
                  type: integer
      responses:
        '200':
          description: Tracking session started
  /api/space/launches/schedule:
    get:
      tags: [space-service]
      summary: List upcoming launch windows
      responses:
        '200':
          description: OK

  # ── telecom-service ──
  /api/telecom/health:
    get:
      tags: [telecom-service]
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/telecom/stats:
    get:
      tags: [telecom-service]
      summary: Service statistics
      responses:
        '200':
          description: OK
  /api/telecom:
    get:
      tags: [telecom-service]
      summary: List telecom channels
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
    post:
      tags: [telecom-service]
      summary: Create telecom channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Created
  /api/telecom/{id}:
    get:
      tags: [telecom-service]
      summary: Get channel by ID
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: OK
    put:
      tags: [telecom-service]
      summary: Update channel
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
    delete:
      tags: [telecom-service]
      summary: Delete channel
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Deleted
  /api/telecom/spectrum/allocate:
    post:
      tags: [telecom-service]
      summary: Allocate frequency spectrum band
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                bandMhz:
                  type: number
                region:
                  type: string
      responses:
        '200':
          description: Allocated
  /api/telecom/towers/coverage:
    get:
      tags: [telecom-service]
      summary: Get tower coverage map data
      parameters:
        - name: lat
          in: query
          schema:
            type: number
        - name: lng
          in: query
          schema:
            type: number
        - name: radiusKm
          in: query
          schema:
            type: number
      responses:
        '200':
          description: Coverage data

  # ── genomics-service ──
  /api/genomics/health:
    get:
      tags: [genomics-service]
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/genomics/stats:
    get:
      tags: [genomics-service]
      summary: Service statistics
      responses:
        '200':
          description: OK
  /api/genomics:
    get:
      tags: [genomics-service]
      summary: List genomic samples
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list
    post:
      tags: [genomics-service]
      summary: Submit genomic sample
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Created
  /api/genomics/{id}:
    get:
      tags: [genomics-service]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      summary: Get sample by ID
      responses:
        '200':
          description: OK
    put:
      tags: [genomics-service]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      summary: Update sample
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
    delete:
      tags: [genomics-service]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      summary: Delete sample
      responses:
        '204':
          description: Deleted
  /api/genomics/sequence:
    post:
      tags: [genomics-service]
      summary: Start sequencing pipeline
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sampleId:
                  type: string
                pipeline:
                  type: string
                  enum: [whole-genome, exome, rna-seq]
      responses:
        '202':
          description: Pipeline queued
  /api/genomics/variants/{sampleId}:
    get:
      tags: [genomics-service]
      summary: Get variant annotations for a sample
      parameters:
        - name: sampleId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Variant list

  # ── iot-robotics-service ──
  /api/iot-robotics/health:
    get:
      tags: [iot-robotics-service]
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
