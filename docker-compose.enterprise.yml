# ============================================================================
# Ierahkwa Ne Kanienke — Enterprise Orchestrator
# Levanta los 84 microservicios .NET + infraestructura de una sola vez
#
# Uso:
#   docker-compose -f docker-compose.infra.yml -f docker-compose.enterprise.yml up -d
#
# Prerequisitos:
#   - docker-compose.infra.yml levantado (PostgreSQL, Redis, MongoDB, MinIO)
#   - .env con las variables requeridas (ver .env.example)
#
# Los servicios están organizados por dominio:
#   Ports 5100-5119: AI & Intelligence
#   Ports 5120-5139: Government Core
#   Ports 5140-5159: Finance & Banking
#   Ports 5160-5179: Citizen Services
#   Ports 5180-5199: Infrastructure & DevOps
#   Ports 5200-5219: Economy & Commerce
#   Ports 5220-5239: Social & Culture
#   Ports 5240-5259: Resources & Environment
#   Ports 5260-5279: Security & Justice
#   Ports 5280-5299: Education & Science
#   Ports 5300-5319: Communications & Media
#   Ports 5320-5339: Blockchain & DeFi
# ============================================================================

x-dotnet-defaults: &dotnet-defaults
  restart: unless-stopped
  networks: [enterprise-net]
  environment: &dotnet-env
    ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
    ConnectionStrings__DefaultConnection: Host=${POSTGRES_HOST:-mamey-postgres};Database=${POSTGRES_DB:-mamey};Username=${POSTGRES_USER:-mamey};Password=${POSTGRES_PASSWORD:?required}
    ConnectionStrings__Redis: ${REDIS_HOST:-mamey-redis}:6379,password=${REDIS_PASSWORD:-}
    Jwt__Secret: ${JWT_SECRET:?required}
    Jwt__Issuer: ${JWT_ISSUER:-ierahkwa.org}
  deploy:
    resources:
      limits:
        memory: 256M
        cpus: "0.5"
  healthcheck:
    test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 30s

networks:
  enterprise-net:
    driver: bridge
    name: ierahkwa-enterprise

