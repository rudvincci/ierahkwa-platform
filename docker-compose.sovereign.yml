# ===========================================
# SOVEREIGN PLATFORM — Docker Compose
# Ierahkwa Ne Kanienke Digital Nation
# ===========================================
# Uso: docker compose -f docker-compose.sovereign.yml up -d
# ===========================================

version: "3.8"

networks:
  sovereign-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres-data:
  redis-data:
  mameynode-data:
  grafana-data:
  prometheus-data:
  tor-data:
  tor-hidden-service:
  ipfs-data:
  ollama-data:
  hns-data:
  matrix-data:
  synapse-data:
  ntfy-data:

services:
  # ==========================================
  # BLOCKCHAIN — MameyNode v4.2
  # ==========================================
  mameynode:
    image: mamey/node:latest
    build:
      context: ./03-backend/blockchain-api
    container_name: mameynode
    ports:
      - "127.0.0.1:8545:8545"
    volumes:
      - mameynode-data:/data
    environment:
      - CHAIN_ID=777777
      - NODE_VERSION=4.2
      - RPC_PORT=8545
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # .NET SERVICES — Identidad, ZKP, Tesoreria
  # ==========================================
  identity-service:
    image: mcr.microsoft.com/dotnet/aspnet:10.0
    container_name: identity-service
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:5001
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=postgres;Database=ierahkwa_identity;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  zkp-service:
    image: mcr.microsoft.com/dotnet/aspnet:10.0
    container_name: zkp-service
    ports:
      - "127.0.0.1:5002:5002"
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:5002
    depends_on:
      - identity-service
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  treasury-service:
    image: mcr.microsoft.com/dotnet/aspnet:10.0
    container_name: treasury-service
    ports:
      - "127.0.0.1:5003:5003"
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:5003
      - ConnectionStrings__Default=Host=postgres;Database=ierahkwa_treasury;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # NODE.JS SERVICES — Plataformas
  # ==========================================
  bdet-bank:
    build:
      context: ./03-backend/plataforma-principal
    container_name: bdet-bank
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - MAMEYNODE_RPC=http://mameynode:8545
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ierahkwa_sovereign}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${IDENTITY_JWT_SECRET:?JWT secret is required}
    depends_on:
      - mameynode
      - postgres
      - redis
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  voz-soberana:
    build:
      context: ./03-backend/social-media
    container_name: voz-soberana
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      - PORT=3002
      - NODE_ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ierahkwa_sovereign}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  red-social:
    build:
      context: ./03-backend/red-social
    container_name: red-social
    ports:
      - "127.0.0.1:3003:3003"
    environment:
      - PORT=3003
      - NODE_ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ierahkwa_sovereign}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  correo-soberano:
    build:
      context: ./03-backend/api-gateway
    container_name: correo-soberano
    ports:
      - "127.0.0.1:3004:3004"
    environment:
      - PORT=3004
      - NODE_ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ierahkwa_sovereign}
      - SMTP_HOST=${SMTP_HOST:-localhost}
      - SMTP_PORT=${SMTP_PORT:-587}
    depends_on:
      - postgres
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  reservas:
    build:
      context: ./03-backend/reservas
    container_name: reservas
    ports:
      - "127.0.0.1:3005:3005"
    environment:
      - PORT=3005
      - NODE_ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ierahkwa_sovereign}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  voto-soberano:
    build:
      context: ./03-backend/voto-soberano
    container_name: voto-soberano
    ports:
      - "127.0.0.1:3006:3006"
    environment:
      - PORT=3006
      - NODE_ENV=production
      - MAMEYNODE_RPC=http://mameynode:8545
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ierahkwa_sovereign}
    depends_on:
      - mameynode
      - postgres
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  trading:
    build:
      context: ./03-backend/trading
    container_name: trading
    ports:
      - "127.0.0.1:3007:3007"
    environment:
      - PORT=3007
      - NODE_ENV=production
      - MAMEYNODE_RPC=http://mameynode:8545
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ierahkwa_sovereign}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - mameynode
      - postgres
      - redis
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3007/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # NODE.JS SERVICES — Extended Platforms
  # ==========================================
  pos-system:
    build:
      context: ./03-backend/pos-system
    container_name: pos-system
    ports:
      - "127.0.0.1:3030:3030"
    environment:
      - PORT=3030
      - NODE_ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ierahkwa_sovereign}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ierahkwa-shop:
    build:
      context: ./03-backend/ierahkwa-shop
    container_name: ierahkwa-shop
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      - PORT=3100
      - NODE_ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ierahkwa_sovereign}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  inventory-system:
    build:
      context: ./03-backend/inventory-system
    container_name: inventory-system
    ports:
      - "127.0.0.1:3200:3200"
    environment:
      - PORT=3200
      - NODE_ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ierahkwa_sovereign}
    depends_on:
      - postgres
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3200/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  image-upload:
    build:
      context: ./03-backend/image-upload
    container_name: image-upload
    ports:
      - "127.0.0.1:3300:3300"
    environment:
      - PORT=3300
      - NODE_ENV=production
    depends_on:
      - postgres
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3300/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  forex-trading:
    build:
      context: ./03-backend/forex-trading-server
    container_name: forex-trading
    ports:
      - "127.0.0.1:3400:3400"
    environment:
      - PORT=3400
      - NODE_ENV=production
      - MAMEYNODE_RPC=http://mameynode:8545
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ierahkwa_sovereign}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - mameynode
      - postgres
      - redis
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3400/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  smart-school:
    build:
      context: ./03-backend/smart-school-node
    container_name: smart-school
    ports:
      - "127.0.0.1:3500:3500"
    environment:
      - PORT=3500
      - NODE_ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ierahkwa_sovereign}
    depends_on:
      - postgres
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3500/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # NODE.JS SERVICES — Sovereign Open-Source
  # ==========================================
  conferencia-soberana:
    build:
      context: ./03-backend/conferencia-soberana
    container_name: conferencia-soberana
    ports:
      - "127.0.0.1:3090:3090"
    environment:
      - PORT=3090
      - NODE_ENV=production
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3090}
      - JWT_SECRET=${JWT_SECRET:?JWT secret is required}
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3090/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  vigilancia-soberana:
    build:
      context: ./03-backend/vigilancia-soberana
    container_name: vigilancia-soberana
    ports:
      - "127.0.0.1:3091:3091"
    environment:
      - PORT=3091
      - NODE_ENV=production
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3091}
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3091/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  empresa-soberana:
    build:
      context: ./03-backend/empresa-soberana
    container_name: empresa-soberana
    ports:
      - "127.0.0.1:3092:3092"
    environment:
      - PORT=3092
      - NODE_ENV=production
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3092}
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ierahkwa_sovereign}
    depends_on:
      - postgres
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3092/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # SOVEREIGN CORE — Universal Backend (441+ platforms)
  # ==========================================
  sovereign-core:
    build:
      context: ./03-backend/sovereign-core
    container_name: sovereign-core
    ports:
      - "127.0.0.1:3050:3050"
    environment:
      - PORT=3050
      - NODE_ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ierahkwa_sovereign}
      - JWT_SECRET=${JWT_SECRET:?JWT secret is required}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://ierahkwa.gov}
      - SMTP_HOST=${SMTP_HOST:-localhost}
      - SMTP_PORT=${SMTP_PORT:-587}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3050/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # REVERSE PROXY — Nginx
  # ==========================================
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    volumes:
      - ./04-infraestructura/nginx:/etc/nginx/conf.d:ro
      - ./02-plataformas-html:/usr/share/nginx/html:ro
    depends_on:
      - identity-service
      - bdet-bank
      - voz-soberana
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ==========================================
  # DATABASES
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ierahkwa_sovereign}
      - POSTGRES_USER=${POSTGRES_USER:?Postgres user is required}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Postgres password is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./04-infraestructura/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:?Redis password is required}
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # SOVEREIGN INFRASTRUCTURE — Tor, IPFS, AI, DNS, Comms
  # ==========================================

  # --- Tor Hidden Service ---
  tor-proxy:
    image: osminogin/tor-simple:latest
    container_name: tor-proxy
    volumes:
      - tor-data:/var/lib/tor
      - tor-hidden-service:/var/lib/tor/hidden_service
    environment:
      - TOR_HIDDEN_SERVICE_PORT_80=nginx-proxy:80
      - TOR_HIDDEN_SERVICE_PORT_443=nginx-proxy:443
      - TOR_HIDDEN_SERVICE_PORT_3050=sovereign-core:3050
    depends_on:
      - nginx-proxy
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "--socks5-hostname", "localhost:9050", "http://check.torproject.org/api/ip"]
      interval: 60s
      timeout: 30s
      retries: 5

  # --- IPFS — Archivo Eterno Soberano ---
  ipfs-node:
    image: ipfs/kubo:latest
    container_name: ipfs-node
    ports:
      - "127.0.0.1:5101:5001"
      - "127.0.0.1:8080:8080"
    volumes:
      - ipfs-data:/data/ipfs
    environment:
      - IPFS_PROFILE=server
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ipfs", "dag", "stat", "/ipfs/QmUNLLsPACCz1vLxQVkXqqLX5R1X345qqfHbsf67hvA3Nn"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Ollama — IA Soberana (Mediador) ---
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
      - ./ai-training/Modelfile:/tmp/Modelfile:ro
    networks:
      - sovereign-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Handshake DNS — DNS Soberano ---
  hsd-node:
    image: handshake-org/hsd:latest
    container_name: hsd-node
    ports:
      - "127.0.0.1:12037:12037"
      - "127.0.0.1:12038:12038"
      - "127.0.0.1:5349:5349"
    volumes:
      - hns-data:/root/.hsd
      - ./sovereign-dns/handshake-config.json:/etc/hsd/config.json:ro
    command: ["--config=/etc/hsd/config.json"]
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:12037"]
      interval: 60s
      timeout: 15s
      retries: 3

  # --- Matrix Synapse — Comunicacion Soberana ---
  synapse:
    image: matrixdotorg/synapse:latest
    container_name: synapse
    ports:
      - "127.0.0.1:8008:8008"
      - "127.0.0.1:8448:8448"
    volumes:
      - synapse-data:/data
    environment:
      - SYNAPSE_SERVER_NAME=matrix.ierahkwa.org
      - SYNAPSE_REPORT_STATS=no
      - SYNAPSE_NO_TLS=yes
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/_matrix/client/versions"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- ntfy — Notificaciones Push Soberanas ---
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    ports:
      - "127.0.0.1:2586:80"
    volumes:
      - ntfy-data:/var/cache/ntfy
    command: serve
    environment:
      - NTFY_BASE_URL=https://ntfy.ierahkwa.org
      - NTFY_UPSTREAM_BASE_URL=
      - NTFY_AUTH_DEFAULT_ACCESS=deny-all
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ==========================================
  # MONITORING
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - prometheus-data:/prometheus
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Grafana admin password is required}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - sovereign-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
